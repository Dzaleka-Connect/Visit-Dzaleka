[build]
  command = "npm run build"
  publish = "dist/public"

[build.environment]
  NPM_FLAGS = "--include=dev"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/1/1/*"
  to = "/.netlify/functions/api/1/:splat"
  status = 200

[[redirects]]
  from = "/1/*"
  to = "/.netlify/functions/api/1/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
